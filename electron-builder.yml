appId: com.sidebrowser.app
productName: sidebrowser

directories:
  output: release
  buildResources: resources

files:
  - "out/**/*"
  - "package.json"

asarUnpack:
  - "resources/**"

extraResources:
  - from: resources/tray
    to: tray
    filter:
      - "**/*"

win:
  target:
    - target: nsis
      arch: x64
  icon: resources/icon.ico
  signAndEditExecutable: false
  # publisherName is NOT a WindowsConfiguration property in eb 26.x
  # (additionalProperties: false); it moved to win.signtoolOptions.publisherName
  # or win.azureSignOptions.publisherName. Omitted until signing is wired.

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  allowElevation: false
  deleteAppDataOnUninstall: false
  artifactName: "${productName}-Setup-${version}.exe"
