appId: com.sidebrowser.app
productName: sidebrowser

directories:
  output: release
  buildResources: resources

files:
  - "out/**/*"
  - "package.json"

asarUnpack:
  - "resources/**"

# Runs after win-unpacked/ is assembled, before NSIS packaging. Patches the
# main app .exe icon via standalone rcedit — replaces the electron-builder
# default path (disabled below via signAndEditExecutable: false). See
# scripts/after-pack.mjs for the why.
afterPack: ./scripts/after-pack.mjs

win:
  target:
    - target: nsis
      arch: x64
  icon: resources/icon.ico
  # workaround: winCodeSign symlink extraction fails without Windows Developer
  # Mode; skipping rcedit means the .exe uses Electron's default icon. Revisit
  # when code signing is wired (signtoolOptions) or Dev Mode is available.
  signAndEditExecutable: false
  # publisherName is NOT a WindowsConfiguration property in eb 26.x
  # (additionalProperties: false); it moved to win.signtoolOptions.publisherName
  # or win.azureSignOptions.publisherName. Omitted until signing is wired.

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  allowElevation: false
  deleteAppDataOnUninstall: false
  artifactName: "${productName}-Setup-${version}.exe"
